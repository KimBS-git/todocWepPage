<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>로그인 처리 중...</title>
  </head>
  <body>
    <script
      src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
      integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
      crossorigin="anonymous"
    ></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
      $(document).ready(function () {
        Kakao.init("3ca77f9ef133289839ab3de450e2643f");

        var params = new URLSearchParams(window.location.search);
        var code = params.get("code");

        if (!code) {
          alert("로그인 정보가 없어요. 다시 시도해주세요.");
          window.location.href = "login.html";
          return;
        }

        // ✅ 카카오 서버에 직접 토큰 요청 (백엔드 없이!)
        $.ajax({
          url: "https://kauth.kakao.com/oauth/token",
          type: "POST",
          data: {
            grant_type: "authorization_code",
            client_id: "3ca77f9ef133289839ab3de450e2643f", // JavaScript 앱 키
            redirect_uri: "https://kimbs-git.github.io/todocWepPage/callback.html",
            code: code,
            // ⚠️ client_secret이 없는 앱이면 이 줄 삭제
            // client_secret: "여기에_시크릿_키",
          },
          success: function (res) {
            var accessToken = res.access_token;

            // 사용자 정보 요청
            $.ajax({
              url: "https://kapi.kakao.com/v2/user/me",
              type: "GET",
              headers: { Authorization: "Bearer " + accessToken },
              success: function (user) {
                var nickname =
                  user.kakao_account?.profile?.nickname || "사용자";
                var profileImg =
                  user.kakao_account?.profile?.profile_image_url || "";

                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("nickname", nickname);
                localStorage.setItem("profileImg", profileImg);

                window.location.href = "index.html";
              },
              error: function () {
                alert("사용자 정보를 가져오지 못했어요.");
                window.location.href = "login.html";
              },
            });
          },
          error: function (err) {
            console.error(err);
            alert("로그인에 실패했어요. 다시 시도해주세요.");
            window.location.href = "login.html";
          },
        });
      });
    </script>
  </body>
</html>
