<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>로그인 처리 중...</title>
  </head>
  <body>
    <!-- 카카오 JavaScript SDK v2 -->
    <script
      src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
      integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
      crossorigin="anonymous"
    ></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
      $(document).ready(function () {
        var params = new URLSearchParams(window.location.search);
        var code = params.get("code");

        if (!code) {
          alert("로그인 정보가 없어요. 다시 시도해주세요.");
          window.location.href = "login.html";
          return;
        }

        // ① Netlify Function에 인가 코드 전달 → 액세스 토큰 받기
        $.ajax({
          url: "/.netlify/functions/kakao_token", // Netlify Function 주소
          type: "POST",
          contentType: "application/json",
          data: JSON.stringify({
            code: code,
            redirectUri: "https://todoc-app.netlify.app/callback.html", // 본인 주소로 변경
          }),
          success: function (res) {
            var data = typeof res === 'string' ? JSON.parse(res) : res;
            var accessToken = data.accessToken;

            // ② 액세스 토큰으로 카카오 사용자 정보 요청
            $.ajax({
              url: "https://kapi.kakao.com/v2/user/me",
              type: "GET",
              headers: {
                Authorization: "Bearer " + accessToken,
              },
              success: function (user) {
                var nickname =
                  user.kakao_account?.profile?.nickname || "사용자";
                var profileImg =
                  user.kakao_account?.profile?.profile_image_url || "";

                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("nickname", nickname);
                localStorage.setItem("profileImg", profileImg);

                window.location.href = "index.html";
              },
              error: function () {
                alert("사용자 정보를 가져오지 못했어요.");
                window.location.href = "login.html";
              },
            });
          },
          error: function () {
            alert("로그인에 실패했어요. 다시 시도해주세요.");
            window.location.href = "login.html";
          },
        });
      });
    </script>
  </body>
</html>
