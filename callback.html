<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>로그인 처리 중...</title>
  </head>
  <body>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
      // =============================================
      // 카카오 OAuth 콜백 처리 페이지
      //
      // 흐름:
      //   1. 카카오가 이 페이지로 ?code=XXX 파라미터를 붙여 리다이렉트
      //   2. 인가 코드(code)로 액세스 토큰 요청 ($.ajax)
      //   3. 액세스 토큰으로 사용자 정보 요청 ($.ajax)
      //   4. 닉네임, 프로필 이미지를 localStorage에 저장
      //   5. 메인 페이지(index.html)로 이동
      //
      // ⚠️ 주의: client_id(REST API 키)가 클라이언트에 노출됩니다.
      //   실서비스에서는 토큰 교환을 반드시 백엔드 서버에서 처리해야 합니다.
      // =============================================

      // URL 쿼리스트링에서 카카오가 보내준 인가 코드 추출
      // 예: callback.html?code=ABCDEF&state=XYZ → code = 'ABCDEF'
      var params = new URLSearchParams(window.location.search);
      var code   = params.get('code');

      if (code) {

        // =============================================
        // Step 1: 인가 코드 → 액세스 토큰 요청
        // jQuery $.ajax 사용 (fetch → $.ajax 대체)
        // =============================================
        $.ajax({
          url: 'https://kauth.kakao.com/oauth/token',
          type: 'POST',
          data: {
            grant_type:   'authorization_code',
            client_id:    'c1b495391dbe2b193fa458c72dbb90dc', // REST API 키
            redirect_uri: 'https://kimbs-git.github.io/todocWepPage/callback.html',
            code:         code
          },
          success: function (tokenData) {
            // 토큰 발급 성공 → 액세스 토큰으로 사용자 정보 요청
            var accessToken = tokenData.access_token;

            // =============================================
            // Step 2: 액세스 토큰 → 사용자 정보 요청
            // Authorization 헤더에 Bearer 토큰 포함
            // =============================================
            $.ajax({
              url: 'https://kapi.kakao.com/v2/user/me',
              type: 'GET',
              headers: {
                'Authorization': 'Bearer ' + accessToken
              },
              success: function (user) {
                // 사용자 정보 추출
                var nickname   = user.kakao_account?.profile?.nickname;
                var profileImg = user.kakao_account?.profile?.profile_image_url;

                // localStorage에 로그인 정보 저장
                // (마이페이지, 네비게이션 등에서 이 값을 읽어 사용)
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('nickname',   nickname);
                localStorage.setItem('profileImg', profileImg);

                // 로그인 완료 → 메인 페이지로 이동
                window.location.href = 'index.html';
              },
              error: function (err) {
                console.error('사용자 정보 요청 실패:', err);
                alert('로그인에 실패했습니다. 다시 시도해주세요.');
                window.location.href = 'login.html';
              }
            });
          },
          error: function (err) {
            console.error('토큰 요청 실패:', err);
            alert('로그인에 실패했습니다. 다시 시도해주세요.');
            window.location.href = 'login.html';
          }
        });

      } else {
        // 인가 코드가 없으면 (직접 접근 등) → 로그인 페이지로 이동
        window.location.href = 'login.html';
      }
    </script>
  </body>
</html>
