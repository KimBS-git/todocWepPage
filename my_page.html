<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>토닥 - 마이페이지</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #3b6ff0;
      --blue-dark: #2a55cc;
      --blue-light: #eef3ff;
      --bg: #f5f4f9;
      --white: #ffffff;
      --text: #1a1a2e;
      --gray: #8a8faa;
      --card-shadow: 0 8px 32px rgba(59,111,240,0.10);
    }

    body {
      font-family: "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      background: rgba(245,244,249,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(59,111,240,0.07);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--blue);
      letter-spacing: -1px;
      text-decoration: none;
    }
    .logo-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }

    /* 메인 컨텐츠 */
    .page-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 100px 24px 60px;
    }

    /* 프로필 카드 */
    .profile-card {
      background: var(--blue);
      border-radius: 28px;
      padding: 36px 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 24px;
      box-shadow: 0 16px 48px rgba(59,111,240,0.25);
      animation: fadeUp 0.5s ease both;
    }
    .profile-img-wrap {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,0.4);
    }
    .profile-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .profile-info { flex: 1; }
    .profile-greeting {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.7);
      font-weight: 500;
      margin-bottom: 4px;
    }
    .profile-name {
      font-size: 1.4rem;
      font-weight: 900;
      color: white;
      letter-spacing: -0.5px;
    }
    .profile-badge {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.15);
      border-radius: 50px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 700;
      color: white;
    }

    /* 섹션 제목 */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      margin-top: 32px;
    }
    .section-title {
      font-size: 1.05rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-count {
      background: var(--blue-light);
      color: var(--blue);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 50px;
    }

    /* 예약 카드 */
    .booking-card {
      background: var(--white);
      border-radius: 20px;
      padding: 20px 22px;
      margin-bottom: 12px;
      box-shadow: var(--card-shadow);
      display: flex;
      align-items: center;
      gap: 16px;
      border: 1px solid rgba(59,111,240,0.06);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.5s ease both;
    }
    .booking-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(59,111,240,0.13);
    }
    .booking-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: var(--blue-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .booking-icon.done { background: #f0f0f5; }
    .booking-info { flex: 1; }
    .booking-name {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }
    .booking-detail {
      font-size: 0.78rem;
      color: var(--gray);
      font-weight: 500;
    }
    .booking-badge {
      border-radius: 10px;
      padding: 6px 14px;
      font-size: 0.72rem;
      font-weight: 800;
      text-align: center;
      flex-shrink: 0;
    }
    .badge-upcoming {
      background: var(--blue-light);
      color: var(--blue);
    }
    .badge-done {
      background: #f0f0f5;
      color: var(--gray);
    }
    .dday-badge {
      background: var(--blue);
      color: white;
      border-radius: 10px;
      padding: 6px 14px;
      text-align: center;
      flex-shrink: 0;
    }
    .dday-label { font-size: 0.6rem; font-weight: 700; }
    .dday-num { font-size: 1rem; font-weight: 900; }

    /* 빈 상태 */
    .empty-state {
      background: var(--white);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: var(--card-shadow);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.88rem; color: var(--gray); }

    /* 반려동물 카드 */
    .pet-card {
      background: var(--white);
      border-radius: 20px;
      padding: 20px 22px;
      margin-bottom: 12px;
      box-shadow: var(--card-shadow);
      display: flex;
      align-items: center;
      gap: 16px;
      border: 1px solid rgba(59,111,240,0.06);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.5s ease both;
    }
    .pet-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(59,111,240,0.13);
    }
    .pet-emoji {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: var(--blue-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
    }
    .pet-info { flex: 1; }
    .pet-name {
      font-size: 1rem;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .pet-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .pet-tag {
      background: var(--bg);
      color: var(--gray);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 50px;
      border: 1px solid rgba(59,111,240,0.08);
    }
    .pet-tag.gender-male {
      background: #eef3ff;
      color: var(--blue);
    }
    .pet-tag.gender-female {
      background: #fff0f5;
      color: #e05599;
    }

    /* 로그아웃 버튼 */
    .logout-btn {
      width: 100%;
      margin-top: 32px;
      padding: 16px;
      background: var(--white);
      border: 1.5px solid rgba(59,111,240,0.15);
      border-radius: 16px;
      color: var(--gray);
      font-size: 0.9rem;
      font-weight: 700;
      font-family: "Noto Sans KR", sans-serif;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .logout-btn:hover {
      background: #fff0f0;
      color: #e05555;
      border-color: #e05555;
    }

    /* 홈으로 */
    .back-home {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 16px;
      font-size: 0.82rem;
      color: var(--gray);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .back-home:hover { color: var(--blue); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .page-wrap { padding: 80px 16px 40px; }
      .profile-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">🐾</div>
      토닥
    </a>
  </nav>

  <div class="page-wrap">

    <!-- 프로필 카드 -->
    <div class="profile-card">
      <div class="profile-img-wrap">
        <img id="profileImgEl" src="" alt="프로필" onerror="this.style.display='none'; this.parentElement.innerHTML='🐾';" />
      </div>
      <div class="profile-info">
        <div class="profile-greeting">안녕하세요!</div>
        <div class="profile-name"><span id="nicknameEl">사용자</span>님</div>
        <div class="profile-badge">🐾 토닥 회원</div>
      </div>
    </div>

    <!-- 예정된 예약 -->
    <div class="section-header">
      <div class="section-title">
        📅 예정된 예약
        <span class="section-count">2건</span>
      </div>
    </div>

    <div class="booking-card" style="animation-delay: 0.1s">
      <div class="booking-icon">🏥</div>
      <div class="booking-info">
        <div class="booking-name">하이유 동물병원</div>
        <div class="booking-detail">정기검진 · 2026.04.02 (목) 13:00</div>
      </div>
      <div class="dday-badge">
        <div class="dday-label">D-DAY</div>
        <div class="dday-num">6</div>
      </div>
    </div>

    <div class="booking-card" style="animation-delay: 0.2s">
      <div class="booking-icon">✂️</div>
      <div class="booking-info">
        <div class="booking-name">럭키 펫 미용</div>
        <div class="booking-detail">전체 미용 · 2026.04.15 (수) 10:00</div>
      </div>
      <div class="dday-badge">
        <div class="dday-label">D-DAY</div>
        <div class="dday-num">19</div>
      </div>
    </div>

    <!-- 내 반려동물 -->
    <div class="section-header">
      <div class="section-title">
        🐾 내 반려동물
        <span class="section-count">2마리</span>
      </div>
    </div>

    <div class="pet-card" style="animation-delay: 0.3s">
      <div class="pet-emoji">🐱</div>
      <div class="pet-info">
        <div class="pet-name">호</div>
        <div class="pet-tags">
          <span class="pet-tag">코리안 숏헤어</span>
          <span class="pet-tag gender-male">♂ 수컷</span>
          <span class="pet-tag">6살</span>
        </div>
      </div>
    </div>

    <div class="pet-card" style="animation-delay: 0.4s">
      <div class="pet-emoji">🐱</div>
      <div class="pet-info">
        <div class="pet-name">쿤</div>
        <div class="pet-tags">
          <span class="pet-tag">코리안 숏헤어</span>
          <span class="pet-tag gender-female">♀ 암컷</span>
          <span class="pet-tag">6살</span>
        </div>
      </div>
    </div>

    <!-- 로그아웃 -->
    <button class="logout-btn" onclick="handleLogout()">
      🚪 로그아웃
    </button>

    <a href="index.html" class="back-home">← 홈으로 돌아가기</a>

  </div>

  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
    integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
    crossorigin="anonymous"></script>
  <script>
    // 로그인 상태 확인 - 로그인 안됐으면 로그인 페이지로
    const isLoggedIn = localStorage.getItem('isLoggedIn');
    if (!isLoggedIn) {
      window.location.href = 'login.html';
    }

    // 저장된 사용자 정보 불러오기
    const nickname = localStorage.getItem('nickname') || '사용자';
    const profileImg = localStorage.getItem('profileImg');

    document.getElementById('nicknameEl').textContent = nickname;
    if (profileImg) {
      document.getElementById('profileImgEl').src = profileImg;
    }

    // 로그아웃
    function handleLogout() {
      Kakao.init('3ca77f9ef133289839ab3de450e2643f');

      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('nickname');
      localStorage.removeItem('profileImg');

      if (Kakao.Auth.getAccessToken()) {
        Kakao.Auth.logout(function() {
          window.location.href = 'login.html';
        });
      } else {
        window.location.href = 'login.html';
      }
    }
  </script>

</body>
</html>
